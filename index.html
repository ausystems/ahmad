<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ahmad — The Gallery</title>
<meta name="description" content="A first-person 3D gallery of real client websites designed, built, and sold by Ahmad — Toronto designer, artist & marketer.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230d0e10'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='36' fill='%23c8a24a' text-anchor='middle'%3EA.%3C/text%3E%3C/svg%3E">
<style>
  @font-face { font-family: 'Archivo'; font-weight: 400; font-display: swap; src: url('assets/fonts/Archivo-400.woff2') format('woff2'); }
  @font-face { font-family: 'Archivo'; font-weight: 600; font-display: swap; src: url('assets/fonts/Archivo-600.woff2') format('woff2'); }
  @font-face { font-family: 'Archivo'; font-weight: 700; font-display: swap; src: url('assets/fonts/Archivo-700.woff2') format('woff2'); }
  @font-face { font-family: 'Marcellus'; font-weight: 400; font-display: swap; src: url('assets/fonts/Marcellus-400.woff2') format('woff2'); }
  :root {
    --bg: #0d0e10; --cream: #ece4d3; --gold: #c8a24a; --gold-dim: #8a6f33;
    --ink: #101114; --muted: #9a948a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body { font-family: 'Archivo', 'Helvetica Neue', sans-serif; color: var(--cream);
         -webkit-font-smoothing: antialiased; }
  #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }
  #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
  #ui > * { pointer-events: auto; }
  noscript { position: fixed; inset: 0; display: grid; place-items: center; color: var(--cream); }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="scene"></canvas>
<div id="ui"></div>
<noscript>Ahmad — The Gallery needs JavaScript (and WebGL2) to open.</noscript>
<script type="module" src="js/main.js"></script>
</body>
</html>
